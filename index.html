<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Requisições — CRV/LAS</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%230a84ff' font-family='Arial' font-weight='900' font-size='40'%3E📋%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-scene">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand-icon">📋</div>
    <h2>Requisições</h2>
    <p class="sub">CRV/LAS — Dashboard Executivo</p>
    <select id="loginUser" class="login-field">
      <option value="">Selecione seu nome</option>
      <option value="ALEF">Alef</option>
      <option value="CARLOS VAZ">Carlos Vaz</option>
    </select>
    <div style="position:relative; margin-bottom:14px;">
      <input type="password" id="loginPass" class="login-field" placeholder="Sua senha" autocomplete="off" style="padding-right:48px; margin-bottom:0;">
      <button type="button" onclick="toggleSenha()" id="eyeBtn" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.1rem; color:rgba(235,235,245,.3);"><span id="eyeIcon">👁️</span></button>
    </div>
    <button class="login-btn" id="loginBtn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══════════════ LOADING ══════════════ -->
<div id="ldScreen" class="hidden">
  <div class="ld-spinner"></div>
  <div class="ld-text" id="ldText">Analisando dados...</div>
</div>
<div id="ldBarTop"></div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="mainApp" style="display:none;">

  <div class="top-bar">
    <div class="top-bar-row1">
      <div class="brand">
        <div class="brand-dot">📋</div>
        <div class="brand-text"><h1>Requisições</h1><span>Dashboard</span></div>
      </div>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
    <div class="top-bar-row2">
      <span class="badge badge-online" id="badgeStatus">Online</span>
      <span class="badge badge-gestor">Gestor</span>
      <span class="user-badge" id="userBadge"></span>
    </div>
  </div>

  <div class="container">

    <div class="section-label">Orçamento Total</div>
    <div class="stats-grid">
      <div class="stat-card blue" style="grid-column:1/-1;">
        <span class="s-icon">💰</span>
        <div class="s-label">Total Consumido</div>
        <div class="s-value blue" id="statTotal">R$ 0,00</div>
      </div>
    </div>

    <!-- Switch de Exportação -->
    <div class="relatorio-switch-row" style="margin-bottom: 24px;">
      <span class="relatorio-switch-label">Resumo para WhatsApp</span>
      <div class="apple-switch" id="switchRelatorio" onclick="toggleRelatorio()"><div class="apple-switch-track"><div class="apple-switch-thumb"></div></div></div>
    </div>

    <!-- Cidades Grid -->
    <div class="section-label">Detalhes por Cidade (Clique para abrir)</div>
    <div class="stats-grid" id="cidadesGrid"></div>

    <!-- RANKING DE CIDADES -->
    <div class="section-label" style="margin-top:10px;">🏆 Ranking de Gastos por Cidade</div>
    <div class="ranking-card" id="rankingCidades">
      <!-- Injetado via JS -->
    </div>

    <!-- RANKING DE SETORES -->
    <div class="section-label">📈 Consumo Global por Setor</div>
    <div class="ranking-card" id="rankingSetores">
      <!-- Injetado via JS -->
    </div>

    <p class="sync-time" id="syncTime"></p>
  </div>
</div>

<!-- ══════════════ MODAL: DETALHE CIDADE ══════════════ -->
<div class="modal-full" id="cidadeModal">
  <div class="modal-bar">
    <h2 id="cidadeModalTitle">🏙️ Cidade</h2>
    <button class="modal-close" onclick="fecharCidade()">✕</button>
  </div>
  <div class="modal-body" id="cidadeBody"></div>
</div>

<!-- Overlays -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon" id="successIcon">✅</div>
  <div class="success-msg" id="successMsg">Ok!</div>
  <div class="success-detail" id="successDetail"></div>
</div>
<div class="toast" id="toast"></div>

<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(function(){}); }</script>
<script src="app.js"></script>
</body>
</html>
